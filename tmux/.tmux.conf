# =============================================
# GLOBAL SETTINGS
# =============================================

# tmux-256color required for undercurls and italics in Neovim
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

set -g mouse on
set -g history-limit 100000
set -g focus-events on
set -sg escape-time 0
set -g allow-passthrough on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g status-interval 5
set -g status-position top

# =============================================
# KEY BINDINGS
# =============================================

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Reload config
unbind r
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Split panes (keeps current path)
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window    -c "#{pane_current_path}"

# Resize panes
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5

# Zoom pane
bind -r m resize-pane -Z

# Floating popup terminal
bind f display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "$SHELL"

# New session (prompts for name)
bind C command-prompt -p "New session:" "new-session -s '%%'"

# Smart pane navigation — aware of nvim splits via @pane-is-vim (set by smart-splits.nvim)
# -F evaluates as tmux format, no shell process scan needed
bind-key -n C-h if -F "#{@pane-is-vim}" "send-keys C-h" "select-pane -L"
bind-key -n C-j if -F "#{@pane-is-vim}" "send-keys C-j" "select-pane -D"
bind-key -n C-k if -F "#{@pane-is-vim}" "send-keys C-k" "select-pane -U"
bind-key -n C-l if -F "#{@pane-is-vim}" "send-keys C-l" "select-pane -R"
bind C-l send-keys 'C-l'  # prefix + C-l to clear screen in shell panes (C-l is intercepted globally above)

# =============================================
# COPY MODE (VIM)
# =============================================

set -g mode-keys vi

bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# =============================================
# PLUGINS
# =============================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux#v2.1.2'

# ─── Resurrect / Continuum ───────────────────
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'

# ─── tmux-yank ───────────────────────────────
# On WSL2, route yanked text to the Windows clipboard via clip.exe
if-shell "grep -qi microsoft /proc/version 2>/dev/null" \
  "set -g @yank_selection_mouse 'clipboard'; set -g @override_copy_command 'clip.exe'"

# ─── Catppuccin v2 ───────────────────────────
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'

set -g status-left-length  100
set -g status-right-length 100
set -g status-left  "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_application}#{E:@catppuccin_status_date_time}"

set -g @catppuccin_date_time_text "%Y-%m-%d %H:%M"

# KEEP AT BOTTOM
run '~/.tmux/plugins/tpm/tpm'
